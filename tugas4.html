<!DOCTYPE html>
<html>
<head>
<title>Tugas 4 JavaScript</title>
</head>

<body>

<h2>Tugas 4 JavaScript</h2>

<!-- HEADER -->
<h3>Nama: Lukas Indra Christiawan</h3>
<h3>NIM: 245314016</h3>
<img src="foto.jpg" width="120">

<hr>

<!-- INPUT -->
<label>Nama :</label>
<input type="text" id="nama">

<br><br>

<label>Jumlah Pilihan :</label>
<input type="number" id="jumlah" min="1">

<br><br>

<button onclick="buatPilihan()">OK</button>

<br><br>

<div id="output"></div>

<script>

function buatPilihan(){

let nama = document.getElementById("nama").value;
let jumlah = document.getElementById("jumlah").value;

if(nama=="" || jumlah==""){
alert("Nama dan jumlah harus diisi!");
return;
}

document.getElementById("output").innerHTML =
"Nama: "+nama+"<br>" +
"Jumlah Pilihan: "+jumlah;

}

</script>

</body>
</html>
